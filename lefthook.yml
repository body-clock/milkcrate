# ── Lefthook git hooks ────────────────────────────────────────
# Run on `git commit` — lints and auto-fixes staged files.
# Run on `git push` — validates before remote publish.
#
# Install: npx lefthook install
# Run manually: npx lefthook run pre-commit

pre-commit:
  parallel: false
  commands:
    oxfmt:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx oxfmt --write {staged_files}
      stage_fixed: true

    oxlint:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx oxlint --fix -c .oxlintrc.json {staged_files}

    rubocop:
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion --autocorrect {staged_files}
      stage_fixed: true

    sandi-metz:
      glob: "*.rb"
      run: bin/sandi-metz-check {staged_files}

pre-push:
  commands:
    typecheck:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx tsc --noEmit

    rubocop-check:
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion
