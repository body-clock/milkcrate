# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# ── Sandi Metz POODR metrics ──────────────────────────────
# Rules 1-3: automated with RuboCop
# Rule 4 (controllers → 1 ivar/action) checked via pi extension

Metrics/MethodLength:
  Enabled: true
  Max: 5
  CountAsOne: ["array", "hash", "heredoc"]
  Exclude:
    - "db/migrate/*.rb"
    - "spec/**/*.rb"
    - "lib/**/*.rake"
    - "lib/tasks/**/*.rb"
    - "app/services/authorize_store_service.rb"
    - "app/services/daily_curation_service.rb"
    - "app/services/discogs/shopper_wantlist_client.rb"
    - "app/services/enrichment_service.rb"
    - "app/services/experiments/seed_generator.rb"
    - "app/services/music_brainz_client.rb"
    - "app/services/music_brainz_enricher.rb"
    - "app/services/shopper_auth_callback_service.rb"
    - "app/services/store_discogs_identity_refresh.rb"
    - "app/services/store_sync_service.rb"
    - "app/services/waitlist_registration.rb"

Metrics/ClassLength:
  Enabled: true
  Max: 100
  CountAsOne: ["array", "hash", "heredoc"]
  Exclude:
    - "db/migrate/*.rb"
    - "spec/**/*.rb"

Metrics/ModuleLength:
  Enabled: true
  Max: 100

Metrics/ParameterLists:
  Enabled: true
  Max: 4
  CountKeywordArgs: false
  Exclude:
    - "db/migrate/*.rb"
    - "spec/**/*.rb"
