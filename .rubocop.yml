# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# ── Sandi Metz POODR metrics ──────────────────────────────
# Rules 1-3: automated with RuboCop
# Rule 4 (controllers → 1 ivar/action) checked via pi extension

Metrics/MethodLength:
  Enabled: true
  Max: 10
  CountAsOne: ["array", "hash", "heredoc"]
  Exclude:
    - "db/migrate/*.rb"
    - "spec/**/*.rb"
    - "lib/**/*.rake"
    - "lib/tasks/**/*.rb"

Metrics/ClassLength:
  Enabled: true
  Max: 200
  CountAsOne: ["array", "hash", "heredoc"]
  Exclude:
    - "db/migrate/*.rb"
    - "spec/**/*.rb"

Metrics/ModuleLength:
  Enabled: true
  Max: 200

Metrics/ParameterLists:
  Enabled: true
  Max: 4
  CountKeywordArgs: false
  Exclude:
    - "db/migrate/*.rb"
    - "spec/**/*.rb"
