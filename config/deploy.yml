# Application name
service: milkcrate

# GitHub Container Registry (free)
image: ghcr.io/body-clock/milkcrate

# Hetzner server — replace with your server IP
servers:
  web:
    hosts:
      - 46.225.21.111

# Let's Encrypt SSL
proxy:
  ssl: false
  forward_headers: true
  host: milkcrate.fm

# Container registry
registry:
  server: ghcr.io
  username: body-clock
  password:
    - KAMAL_REGISTRY_PASSWORD

# Environment variables
env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: milkcrate-db
    DB_USER: milkcrate
    DB_PASSWORD: milkcrate
    RAILS_SERVE_STATIC_FILES: true

# Postgres accessory
accessories:
  db:
    image: postgres:16
    host: milkcrate-hetzner
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: milkcrate
        POSTGRES_DB: milkcrate_production
        POSTGRES_HOST_AUTH_METHOD: trust
    directories:
      - data:/var/lib/postgresql/data

# Command to run (Thruster proxy + Rails server)
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent volume for file storage
volumes:
  - "milkcrate_storage:/rails/storage"

# Asset bridging between deploys
asset_path: /rails/public/assets

# Build for amd64 (Hetzner)
builder:
  arch: amd64
