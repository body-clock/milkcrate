production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  full_store_sync:
    class: SyncAllStoresJob
    queue: default
    schedule: every day at 11pm

  daily_curation:
    class: DailyCurationJob
    queue: default
    schedule: every day at 1am

  sales_poll_dispatcher:
    class: SalesPollDispatcherJob
    queue: default
    schedule: every minute

  sitemap_refresh:
    command: "SitemapGenerator::Interpreter.run(config_file: 'config/sitemap.rb', verbose: false)"
    schedule: every day at 5am
