# Milkcrate settings — override per environment or via env vars.

storefront:
  # Number of records on the Wall.
  # Override per environment via STOREFRONT_WALL_COUNT env var.
  wall_count: 12

demo_store:
  name: Beautiful World Syndicate
  discogs_username: philadelphiamusic
  description:

discogs:
  username_pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*[a-zA-Z0-9]"
  # Bypass the minimum listing requirement for testing accounts.
  minimum_listing_exemptions:
    - lil_blizzard

mail:
  from: patrick@milkcrate.fm
  host: milkcrate.fm
  admin_email: patrick@milkcrate.fm

analytics:
  # Plausible Analytics domain for the script data-domain attribute.
  plausible_domain: milkcrate.fm

honeybadger:
  api_key: <%= Rails.application.credentials.honeybadger_api_key %>

experiments:
  crate_size: 40

features:
  # When true, these strategies are excluded from experiment crate generation.
  # The live storefront is unaffected.
  disable_desirability: false
  disable_freshness: true
