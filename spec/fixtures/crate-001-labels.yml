# Holdout fixture: crate-001 labeled records.
#
# Populate after running the first experiment pipeline. Each entry maps a
# position to its human label, algorithm score, and algorithm-derived label.
# Used by specs that need known label data (e.g., scorer validation tests).
#
# Schema:
#   position: integer
#   discogs_release_id: string
#   label: junk | indifferent | cool
#   algorithm_score: float
#   algorithm_label: cool | not_cool
#   artist: string
#   title: string
#
# Example entry (uncomment and fill in after pipeline run):
# - position: 0
#   discogs_release_id: "12345"
#   label: cool
#   algorithm_score: 7.5
#   algorithm_label: cool
#   artist: "Artist Name"
#   title: "Album Title"
