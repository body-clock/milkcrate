<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Labeling</title>
<style>
  :root {
    --bg: #faf9f7;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --junk: #e74c3c;
    --indifferent: #f39c12;
    --cool: #27ae60;
    --junk-hover: #c0392b;
    --indifferent-hover: #d68910;
    --cool-hover: #1e8449;
    --progress-bg: #e8e8e6;
    --progress-fill: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  #progress-container {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--progress-bg);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: var(--progress-fill);
    transition: width 0.3s ease;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 800px;
    padding: 24px 20px 120px;
  }

  #cover-container {
    width: 100%;
    max-width: min(70vh, 500px);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  #cover {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    transition: opacity 0.2s ease;
  }
  #cover.loading { opacity: 0.3; }
  #cover-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: #e8e8e6;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
  }

  #artist { font-size: 22px; font-weight: normal; text-align: center; margin-bottom: 4px; }
  #title { font-size: 18px; color: var(--muted); text-align: center; margin-bottom: 24px; font-style: italic; }

  #metadata {
    display: none;
    width: 100%;
    max-width: 500px;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
  }
  #metadata.visible { display: block; }
  #metadata dt { font-weight: 600; color: var(--text); display: inline; }
  #metadata dt::after { content: ": "; }
  #metadata dd { display: inline; margin: 0 0 4px 0; }
  #metadata dd::after { content: ""; display: block; }

  #flip-reason-container {
    display: none;
    width: 100%;
    max-width: 500px;
    margin-bottom: 24px;
  }
  #flip-reason-container.visible { display: block; }
  #flip-reason {
    width: 100%;
    padding: 12px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    min-height: 60px;
    background: white;
  }
  #flip-reason-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  #buttons {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 500px;
  }
  #buttons button {
    flex: 1;
    padding: 16px 12px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, opacity 0.3s ease;
    color: white;
  }
  #buttons button:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  #btn-junk { background: var(--junk); }
  #btn-junk:hover:not(:disabled) { background: var(--junk-hover); }
  #btn-indifferent { background: var(--indifferent); }
  #btn-indifferent:hover:not(:disabled) { background: var(--indifferent-hover); }
  #btn-cool { background: var(--cool); }
  #btn-cool:hover:not(:disabled) { background: var(--cool-hover); }

  .key-hint {
    display: block;
    font-size: 12px;
    font-weight: normal;
    opacity: 0.8;
    margin-top: 2px;
  }

  #countdown {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 12px;
    min-height: 21px;
  }

  #download-area {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 50;
  }
  #download-btn {
    padding: 10px 24px;
    border: 2px solid var(--text);
    background: white;
    color: var(--text);
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #download-btn:hover { background: var(--text); color: white; }
  #status-text { font-size: 13px; color: var(--muted); }

  #complete {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    padding: 40px 20px;
  }
  #complete.visible { display: flex; }
  #complete h2 { font-size: 24px; font-weight: normal; }
  #complete p { font-size: 16px; color: var(--muted); max-width: 400px; }

  #loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 20px; }
  #loading p { color: var(--muted); }

  #error {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 60px 20px;
    text-align: center;
  }
  #error.visible { display: flex; }
  #error h2 { color: var(--junk); }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --text: #e8e8e6;
      --muted: #999;
      --progress-bg: #333;
      --progress-fill: #e8e8e6;
    }
    #metadata { background: #2a2a2a; border-color: #444; }
    #flip-reason { background: #2a2a2a; border-color: #444; color: var(--text); }
    #cover-placeholder { background: #333; }
    #download-btn { border-color: var(--text); background: #2a2a2a; color: var(--text); }
    #download-btn:hover { background: var(--text); color: var(--bg); }
    #download-area { background: #1a1a1a; border-color: #333; }
  }
</style>
</head>
<body>

<div id="progress-container">
  <div id="progress-bar" style="width: 0%"></div>
</div>

<div id="main">
  <div id="loading"><p>Loading seed data&hellip;</p></div>
  <div id="error"><h2>Error</h2><p id="error-msg"></p></div>

  <div id="complete">
    <h2>All records labeled!</h2>
    <p>Download your results below.</p>
  </div>

  <div id="cover-container">
    <img id="cover" alt="" style="display:none">
    <div id="cover-placeholder">No cover image</div>
  </div>

  <h1 id="artist"></h1>
  <h2 id="title"></h2>

  <dl id="metadata"></dl>

  <div id="flip-reason-container">
    <label id="flip-reason-label" for="flip-reason">What changed your mind?</label>
    <textarea id="flip-reason" placeholder="Optional&hellip;"></textarea>
  </div>

  <div id="countdown"></div>

  <div id="buttons">
    <button id="btn-junk" disabled>
      Junk<span class="key-hint">[J]</span>
    </button>
    <button id="btn-indifferent" disabled>
      Indifferent<span class="key-hint">[I]</span>
    </button>
    <button id="btn-cool" disabled>
      Cool<span class="key-hint">[K]</span>
    </button>
  </div>
</div>

<div id="download-area">
  <span id="status-text">Round 1 &middot; 0 of 0</span>
  <button id="download-btn">Download Results</button>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const ROUND  = params.get("round") === "2" ? 2 : 1;
  const STORAGE_KEY = ROUND === 1 ? "labeling-round1" : "labeling-round2";
  const DELAY_MS = 2000;

  let seed      = [];
  let results   = [];
  let current   = 0;
  let imgLoadTs = null;
  let btnsActive = false;
  let allowNext  = false;
  let round1Labels = null;

  const $loading    = document.getElementById("loading");
  const $error      = document.getElementById("error");
  const $errorMsg   = document.getElementById("error-msg");
  const $complete   = document.getElementById("complete");
  const $cover      = document.getElementById("cover");
  const $placeholder= document.getElementById("cover-placeholder");
  const $artist     = document.getElementById("artist");
  const $titleEl    = document.getElementById("title");
  const $metadata   = document.getElementById("metadata");
  const $flipCtr    = document.getElementById("flip-reason-container");
  const $flipReason = document.getElementById("flip-reason");
  const $countdown  = document.getElementById("countdown");
  const $btnJunk    = document.getElementById("btn-junk");
  const $btnIndiff  = document.getElementById("btn-indifferent");
  const $btnCool    = document.getElementById("btn-cool");
  const $progress   = document.getElementById("progress-bar");
  const $status     = document.getElementById("status-text");
  const $download   = document.getElementById("download-btn");

  async function init() {
    try {
      const resp = await fetch("seed.json");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
      seed = await resp.json();
    } catch (e) {
      showError("Failed to load seed.json. Make sure it's in the same directory as this page.<br><br>" + e.message);
      return;
    }

    if (!seed.length) {
      showError("seed.json is empty.");
      return;
    }

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length) {
          results = parsed;
          current = results.length;
        }
      } catch (_) {}
    }

    if (ROUND === 2) {
      const r1 = localStorage.getItem("labeling-round1");
      if (r1) {
        try { round1Labels = JSON.parse(r1); } catch (_) { round1Labels = null; }
      }
    }

    $loading.style.display = "none";

    if (current >= seed.length) {
      showComplete();
      return;
    }

    if (ROUND === 2) $metadata.classList.add("visible");
    showRecord(current);
  }

  function showRecord(idx) {
    const rec = seed[idx];
    if (!rec) { showComplete(); return; }

    $artist.textContent = rec.artist || "Unknown Artist";
    $titleEl.textContent = rec.title || "Unknown Title";

    if (rec.cover_image_url) {
      $cover.style.display = "";
      $placeholder.style.display = "none";
      $cover.classList.add("loading");
      $cover.src = rec.cover_image_url;
    } else {
      $cover.style.display = "none";
      $placeholder.style.display = "";
    }

    if (ROUND === 2) {
      $metadata.innerHTML = buildMetadata(rec);
      $flipReason.value = "";
      $flipCtr.classList.remove("visible");
    }

    btnsActive = false;
    allowNext = false;
    imgLoadTs = Date.now();
    disableButtons();
    $countdown.textContent = "Buttons unlock in 2s\u2026";
    $flipReason.value = "";

    const pct = ((current) / seed.length * 100).toFixed(1);
    $progress.style.width = pct + "%";
    $status.textContent = `Round ${ROUND} \u00b7 Record ${current + 1} of ${seed.length}`;

    let remaining = DELAY_MS / 1000;
    const timer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(timer);
        $countdown.textContent = "";
        enableButtons();
        btnsActive = true;
      } else {
        $countdown.textContent = `Buttons unlock in ${remaining}s\u2026`;
      }
    }, 1000);
  }

  function buildMetadata(rec) {
    const items = [];
    const add = (label, value) => {
      if (value != null && value !== "" && (!Array.isArray(value) || value.length > 0)) {
        items.push(`<dt>${label}</dt><dd>${Array.isArray(value) ? value.join(", ") : value}</dd>`);
      }
    };
    add("Year", rec.year && rec.year > 0 ? rec.year : null);
    add("Genres", rec.genres);
    add("Styles", rec.styles);
    add("Condition", rec.condition);
    add("Price", rec.price);
    add("Want / Have", rec.want_count != null ? `${rec.want_count} / ${rec.have_count}` : null);
    add("Label", rec.label);
    add("Format", rec.format);
    add("Band", rec.band);
    add("Score", rec.algorithm_score != null ? rec.algorithm_score.toFixed(2) : null);
    return items.join("");
  }

  function disableButtons() {
    $btnJunk.disabled = true;
    $btnIndiff.disabled = true;
    $btnCool.disabled = true;
  }

  function enableButtons() {
    $btnJunk.disabled = false;
    $btnIndiff.disabled = false;
    $btnCool.disabled = false;
  }

  function label(label) {
    if (!btnsActive || allowNext) return;
    allowNext = true;
    btnsActive = false;
    disableButtons();

    const rec = seed[current];
    const elapsed = imgLoadTs ? Date.now() - imgLoadTs : 0;

    const entry = {
      position: rec.position,
      label,
      timing_ms: elapsed,
      timestamp: new Date().toISOString(),
      artist: rec.artist,
      title: rec.title
    };

    if (ROUND === 2 && round1Labels) {
      const r1 = round1Labels.find(l => l.position === rec.position);
      if (r1 && r1.label !== label) {
        entry.flipped_from = r1.label;
        entry.flip_reason = $flipReason.value.trim() || null;
        $flipCtr.classList.add("visible");
        setTimeout(() => advance(entry), 100);
        return;
      }
    }

    advance(entry);
  }

  function advance(entry) {
    results.push(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
    current++;
    if (current >= seed.length) {
      showComplete();
    } else {
      setTimeout(() => showRecord(current), 200);
    }
  }

  function showComplete() {
    $cover.style.display = "none";
    $placeholder.style.display = "none";
    $artist.textContent = "";
    $titleEl.textContent = "";
    $metadata.innerHTML = "";
    $metadata.classList.remove("visible");
    $flipCtr.classList.remove("visible");
    $countdown.textContent = "";
    disableButtons();
    $complete.classList.add("visible");
    $progress.style.width = "100%";
    $status.textContent = `Round ${ROUND} \u00b7 Complete \u00b7 ${results.length} labeled`;
  }

  function showError(msg) {
    $loading.style.display = "none";
    $error.classList.add("visible");
    $errorMsg.innerHTML = msg;
  }

  $download.addEventListener("click", () => {
    const data = JSON.stringify(results, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = ROUND === 1 ? "round1-results.json" : "round2-results.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  $btnJunk.addEventListener("click", () => label("junk"));
  $btnIndiff.addEventListener("click", () => label("indifferent"));
  $btnCool.addEventListener("click", () => label("cool"));

  document.addEventListener("keydown", (e) => {
    if (!btnsActive) return;
    if (e.key === "j" || e.key === "J") label("junk");
    if (e.key === "i" || e.key === "I") label("indifferent");
    if (e.key === "k" || e.key === "K") label("cool");
  });

  $cover.addEventListener("load", () => {
    $cover.classList.remove("loading");
    imgLoadTs = Date.now();
  });

  $cover.addEventListener("error", () => {
    $cover.style.display = "none";
    $placeholder.style.display = "";
  });

  init();
})();
</script>

</body>
</html>
