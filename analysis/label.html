<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Labeling</title>
<style>
  :root {
    --bg: #faf9f7;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --junk: #e74c3c;
    --indifferent: #f39c12;
    --cool: #27ae60;
    --junk-hover: #c0392b;
    --indifferent-hover: #d68910;
    --cool-hover: #1e8449;
    --progress-bg: #e8e8e6;
    --progress-fill: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  #progress-container {
    flex-shrink: 0;
    width: 100%;
    height: 4px;
    background: var(--progress-bg);
  }
  #progress-bar {
    height: 100%;
    background: var(--progress-fill);
    transition: width 0.3s ease;
  }

  #main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 520px;
    padding: 8px 16px;
    gap: 6px;
  }

  #cover-container {
    flex: 1;
    min-height: 0;
    width: 100%;
    max-width: 500px;
    max-height: 55vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #cover {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    transition: opacity 0.2s ease;
  }
  #cover.loading { opacity: 0.3; }
  #cover-placeholder {
    width: 100%;
    aspect-ratio: 1;
    max-width: 500px;
    max-height: 55vh;
    background: #e8e8e6;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
  }

  #artist { font-size: 17px; font-weight: normal; text-align: center; }
  #title { font-size: 14px; color: var(--muted); text-align: center; font-style: italic; }

  #metadata {
    width: 100%;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    flex-shrink: 0;
  }

  #score-detail {
    display: none;
    width: 100%;
    background: #f5f4f2;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text);
    line-height: 1.7;
    flex-shrink: 0;
  }
  #score-detail.visible { display: block; }
  #score-detail .strat-name { font-weight: 600; }
  #score-detail .strat-val  { float: right; }
  #score-detail .total-row  { border-top: 1px solid #ccc; padding-top: 4px; margin-top: 4px; font-weight: 600; }

  #metadata dt { font-weight: 600; color: var(--text); display: inline; }
  #metadata dt::after { content: ": "; }
  #metadata dd { display: inline; margin-right: 0; }
  #metadata dd::after { content: ""; display: block; }

  #buttons {
    display: flex;
    gap: 8px;
    width: 100%;
    flex-shrink: 0;
  }
  #buttons button {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, opacity 0.3s ease;
    color: white;
  }
  #buttons button:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  #btn-junk { background: var(--junk); }
  #btn-junk:hover:not(:disabled) { background: var(--junk-hover); }
  #btn-indifferent { background: var(--indifferent); }
  #btn-indifferent:hover:not(:disabled) { background: var(--indifferent-hover); }
  #btn-cool { background: var(--cool); }
  #btn-cool:hover:not(:disabled) { background: var(--cool-hover); }
  #btn-next {
    display: none;
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: var(--progress-fill);
    color: var(--bg);
    transition: opacity 0.15s ease;
  }
  #btn-next.visible { display: block; }
  #btn-next:hover { opacity: 0.85; }

  .key-hint {
    display: block;
    font-size: 11px;
    font-weight: normal;
    opacity: 0.8;
    margin-top: 1px;
  }

  #countdown {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    min-height: 16px;
    flex-shrink: 0;
  }

  #download-area {
    flex-shrink: 0;
    width: 100%;
    padding: 10px 16px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #reset-btn {
    padding: 6px 14px;
    border: 1px solid #ccc;
    background: transparent;
    color: var(--muted);
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  #reset-btn:hover { border-color: var(--junk); color: var(--junk); }
  #download-btn {
    padding: 10px 24px;
    border: 2px solid var(--text);
    background: white;
    color: var(--text);
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #download-btn:hover { background: var(--text); color: white; }
  #status-text { font-size: 13px; color: var(--muted); }

  #complete {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    padding: 40px 20px;
  }
  #complete.visible { display: flex; }
  #complete h2 { font-size: 24px; font-weight: normal; }
  #complete p { font-size: 16px; color: var(--muted); max-width: 400px; }
  #save-btn {
    padding: 10px 24px;
    border: none;
    background: var(--progress-fill);
    color: var(--bg);
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }
  #save-btn:hover { opacity: 0.85; }
  #save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #save-status { font-size: 13px; color: var(--muted); min-height: 18px; }

  #loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 20px; }
  #loading p { color: var(--muted); }

  #error {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 60px 20px;
    text-align: center;
  }
  #error.visible { display: flex; }
  #error h2 { color: var(--junk); }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --text: #e8e8e6;
      --muted: #999;
      --progress-bg: #333;
      --progress-fill: #e8e8e6;
    }
    #score-detail { background: #222; border-color: #444; }
    #metadata { background: #2a2a2a; border-color: #444; }
    #cover-placeholder { background: #333; }
    #download-area { background: #1a1a1a; border-color: #333; }
    #download-btn { border-color: var(--text); background: #2a2a2a; color: var(--text); }
    #download-btn:hover { background: var(--text); color: var(--bg); }
  }
</style>
</head>
<body>

<div id="progress-container">
  <div id="progress-bar" style="width: 0%"></div>
</div>

<div id="main">
  <div id="loading"><p>Loading seed data&hellip;</p></div>
  <div id="error"><h2>Error</h2><p id="error-msg"></p></div>

  <div id="complete">
    <h2>All records labeled!</h2>
    <p>Download your results below.</p>
    <button id="save-btn">Save to Server</button>
    <span id="save-status"></span>
  </div>

  <div id="cover-container">
    <img id="cover" alt="" style="display:none">
    <div id="cover-placeholder">No cover image</div>
  </div>

  <h1 id="artist"></h1>
  <h2 id="title"></h2>

  <dl id="metadata"></dl>

  <div id="score-detail"></div>

  <div id="countdown"></div>

  <div id="buttons">
    <button id="btn-junk" disabled>
      Junk<span class="key-hint">[J]</span>
    </button>
    <button id="btn-indifferent" disabled>
      Indifferent<span class="key-hint">[I]</span>
    </button>
    <button id="btn-cool" disabled>
      Cool<span class="key-hint">[K]</span>
    </button>
    <button id="btn-next">Next &rarr;</button>
  </div>
</div>

<div id="download-area">
  <span id="status-text">0 of 0</span>
  <button id="download-btn">Download Results</button>
  <button id="reset-btn">Start Over</button>
</div>

<script>
(function() {
  const STORAGE_KEY = "labeling-results";
  const DELAY_MS = 2000;

  let seed      = [];
  let results   = [];
  let current   = 0;
  let crateName = "results";
  let imgLoadTs = null;
  let btnsActive = false;
  let allowNext  = false;

  const $loading    = document.getElementById("loading");
  const $error      = document.getElementById("error");
  const $errorMsg   = document.getElementById("error-msg");
  const $complete   = document.getElementById("complete");
  const $cover      = document.getElementById("cover");
  const $placeholder= document.getElementById("cover-placeholder");
  const $artist     = document.getElementById("artist");
  const $titleEl    = document.getElementById("title");
  const $metadata   = document.getElementById("metadata");
  const $scoreDetail = document.getElementById("score-detail");
  const $countdown  = document.getElementById("countdown");
  const $btnJunk    = document.getElementById("btn-junk");
  const $btnIndiff  = document.getElementById("btn-indifferent");
  const $btnCool    = document.getElementById("btn-cool");
  const $btnNext    = document.getElementById("btn-next");
  const $progress   = document.getElementById("progress-bar");
  const $status     = document.getElementById("status-text");
  const $download   = document.getElementById("download-btn");
  const $resetBtn   = document.getElementById("reset-btn");
  const $saveBtn    = document.getElementById("save-btn");
  const $saveStatus = document.getElementById("save-status");

  async function init() {
    // Clear old localStorage keys from previous labeling versions
    localStorage.removeItem("labeling-round1");
    localStorage.removeItem("labeling-round2");

    try {
      const resp = await fetch("seed.json");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
      seed = await resp.json();
    } catch (e) {
      showError("Failed to load seed.json. Make sure it's in the same directory as this page.<br><br>" + e.message);
      return;
    }

    if (!seed.length) {
      showError("seed.json is empty.");
      return;
    }

    if (seed[0].crate) crateName = seed[0].crate;

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length && parsed.length <= seed.length) {
          // Verify saved results match this seed (check discogs_release_ids)
          const seedIds = new Set(seed.map(r => r.discogs_release_id));
          const allMatch = parsed.every(r => r.release_id && seedIds.has(r.release_id));
          if (allMatch) {
            results = parsed;
            current = results.length;
          } else {
            localStorage.removeItem(STORAGE_KEY);
          }
        } else {
          localStorage.removeItem(STORAGE_KEY);
        }
      } catch (_) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    $loading.style.display = "none";

    if (current >= seed.length) {
      showComplete();
      return;
    }

    $metadata.style.display = "block";
    showRecord(current);
  }

  function showRecord(idx) {
    const rec = seed[idx];
    if (!rec) { showComplete(); return; }

    $scoreDetail.classList.remove("visible");
    $scoreDetail.innerHTML = "";
    $btnNext.classList.remove("visible");

    $artist.textContent = rec.artist || "Unknown Artist";
    $titleEl.textContent = rec.title || "Unknown Title";

    if (rec.cover_image_url) {
      $cover.style.display = "";
      $placeholder.style.display = "none";
      $cover.classList.add("loading");
      $cover.src = rec.cover_image_url;
    } else {
      $cover.style.display = "none";
      $placeholder.style.display = "";
    }

    $metadata.innerHTML = buildMetadata(rec);

    btnsActive = false;
    allowNext = false;
    imgLoadTs = Date.now();
    disableButtons();
    $countdown.textContent = "Buttons unlock in 2s\u2026";

    const pct = ((current) / seed.length * 100).toFixed(1);
    $progress.style.width = pct + "%";
    $status.textContent = `Record ${current + 1} of ${seed.length}`;

    let remaining = DELAY_MS / 1000;
    const timer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(timer);
        $countdown.textContent = "";
        enableButtons();
        btnsActive = true;
      } else {
        $countdown.textContent = `Buttons unlock in ${remaining}s\u2026`;
      }
    }, 1000);
  }

  function buildMetadata(rec) {
    const items = [];
    const add = (label, value) => {
      if (value != null && value !== "" && (!Array.isArray(value) || value.length > 0)) {
        items.push(`<dt>${label}</dt><dd>${Array.isArray(value) ? value.join(", ") : value}</dd>`);
      }
    };
    add("Year", rec.year && rec.year > 0 ? rec.year : null);
    add("Genres", rec.genres);
    add("Styles", rec.styles);
    add("Condition", rec.condition);
    add("Label", rec.label);
    add("Format", rec.format);
    return items.join("");
  }

  function disableButtons() {
    $btnJunk.disabled = true;
    $btnIndiff.disabled = true;
    $btnCool.disabled = true;
  }

  function enableButtons() {
    $btnJunk.disabled = false;
    $btnIndiff.disabled = false;
    $btnCool.disabled = false;
  }

  function buildScoreDetail(rec) {
    const bd = rec.score_breakdown;
    if (!bd) return "";

    const entries = Object.entries(bd).sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]));
    let html = `<div style="font-weight:600;margin-bottom:4px">Score: ${rec.algorithm_score ? rec.algorithm_score.toFixed(2) : "?"}</div>`;
    html += '<div style="font-size:11px;color:var(--muted)">';
    for (const [strat, val] of entries) {
      if (val !== 0) {
        html += `<div><span class="strat-name">${strat}</span><span class="strat-val">${val >= 0 ? "+" : ""}${val.toFixed(2)}</span></div>`;
      }
    }
    html += `<div class="total-row"><span class="strat-name">Total</span><span class="strat-val">${rec.algorithm_score ? (rec.algorithm_score >= 0 ? "+" : "") + rec.algorithm_score.toFixed(2) : "?"}</span></div>`;
    html += "</div>";
    return html;
  }

  function label(label) {
    if (!btnsActive || allowNext) return;
    allowNext = true;
    btnsActive = false;
    disableButtons();

    const rec = seed[current];
    const elapsed = imgLoadTs ? Date.now() - imgLoadTs : 0;

    results.push({
      position: rec.position,
      release_id: rec.discogs_release_id,
      label,
      timing_ms: elapsed,
      timestamp: new Date().toISOString(),
      artist: rec.artist,
      title: rec.title
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(results));

    $scoreDetail.innerHTML = buildScoreDetail(rec);
    $scoreDetail.classList.add("visible");
    $btnNext.classList.add("visible");
  }

  function showComplete() {
    $cover.style.display = "none";
    $placeholder.style.display = "none";
    $artist.textContent = "";
    $titleEl.textContent = "";
    $metadata.innerHTML = "";
    $countdown.textContent = "";
    disableButtons();
    $complete.classList.add("visible");
    $progress.style.width = "100%";
    $status.textContent = `Complete \u00b7 ${results.length} labeled`;
  }

  function showError(msg) {
    $loading.style.display = "none";
    $error.classList.add("visible");
    $errorMsg.innerHTML = msg;
  }

  function saveToServer() {
    $saveBtn.disabled = true;
    $saveStatus.textContent = "Saving...";
    fetch("/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(results)
    })
    .then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      $saveStatus.textContent = "Saved! Run: bin/rake 'experiment:report[" + crateName + "]'";
    })
    .catch(e => {
      $saveStatus.textContent = "Save failed: " + e.message + " — download instead";
      $saveBtn.disabled = false;
    });
  }

  $saveBtn.addEventListener("click", saveToServer);

  $resetBtn.addEventListener("click", () => {
    if (confirm("Clear all labels and start over?")) {
      localStorage.removeItem(STORAGE_KEY);
      results = [];
      current = 0;
      $complete.classList.remove("visible");
      showRecord(0);
    }
  });

  $download.addEventListener("click", () => {
    const data = JSON.stringify(results, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = crateName + "-results.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  $btnJunk.addEventListener("click", () => label("junk"));
  $btnIndiff.addEventListener("click", () => label("indifferent"));
  $btnCool.addEventListener("click", () => label("cool"));

  $btnNext.addEventListener("click", () => {
    current++;
    $btnNext.classList.remove("visible");
    if (current >= seed.length) {
      showComplete();
    } else {
      showRecord(current);
    }
  });

  document.addEventListener("keydown", (e) => {
    if (!btnsActive) return;
    if (e.key === "j" || e.key === "J") label("junk");
    if (e.key === "i" || e.key === "I") label("indifferent");
    if (e.key === "k" || e.key === "K") label("cool");
  });

  $cover.addEventListener("load", () => {
    $cover.classList.remove("loading");
    imgLoadTs = Date.now();
  });

  $cover.addEventListener("error", () => {
    $cover.style.display = "none";
    $placeholder.style.display = "";
  });

  init();
})();
</script>

</body>
</html>
